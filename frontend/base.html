<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}AdVantage AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004ac6",
                        "primary-container": "#2563eb",
                        "surface": "#faf8ff",
                        "on-surface": "#131b2e",
                        "on-surface-variant": "#434655",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f3ff",
                        "surface-container-high": "#e2e7ff",
                        "outline-variant": "#c3c6d7",
                        "error": "#ba1a1a",
                        "tertiary": "#006056",
                    },
                    fontFamily: {
                        "headline": ["Spoqa Han Sans Neo", "Manrope"],
                        "body": ["Spoqa Han Sans Neo", "Inter"],
                        "label": ["Spoqa Han Sans Neo", "Inter"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Spoqa Han Sans Neo', 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Spoqa Han Sans Neo', 'Manrope', sans-serif; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-surface text-on-surface dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300">
    <!-- SideNavBar -->
    <aside class="flex flex-col h-full py-6 px-4 h-screen w-64 fixed left-0 top-0 bg-[#f2f3ff] dark:bg-slate-900 z-40 border-r border-outline-variant/10">
        <div class="flex items-center gap-3 mb-10 px-2 transition-all duration-300 hover:scale-[1.02]">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">analytics</span>
            </div>
            <div>
                <h2 class="text-lg font-black text-[#131b2e] dark:text-white leading-tight">AdVantage AI</h2>
                <p class="text-[10px] uppercase tracking-widest text-on-surface-variant dark:text-slate-400 font-bold">CEO Dashboard</p>
            </div>
        </div>
        <nav class="flex-1 space-y-1">
            {% set path = request.url.path %}
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 {% if path == '/' %}text-[#004ac6] dark:text-[#2563eb] font-bold bg-[#ffffff] dark:bg-slate-800 shadow-sm{% else %}text-[#434655] dark:text-slate-400 hover:text-[#004ac6] dark:hover:text-white hover:bg-[#e2e7ff] dark:hover:bg-slate-800{% endif %}"
                href="/">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' {% if path == '/' %}1{% else %}0{% endif %};">home</span>
                <span class="text-sm">홈</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 {% if path == '/agent' %}text-[#004ac6] dark:text-[#2563eb] font-bold bg-[#ffffff] dark:bg-slate-800 shadow-sm{% else %}text-[#434655] dark:text-slate-400 hover:text-[#004ac6] dark:hover:text-white hover:bg-[#e2e7ff] dark:hover:bg-slate-800{% endif %}"
                href="/agent">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' {% if path == '/agent' %}1{% else %}0{% endif %};">smart_toy</span>
                <span class="text-sm">AI 에이전트</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 {% if path == '/camp' %}text-[#004ac6] dark:text-[#2563eb] font-bold bg-[#ffffff] dark:bg-slate-800 shadow-sm{% else %}text-[#434655] dark:text-slate-400 hover:text-[#004ac6] dark:hover:text-white hover:bg-[#e2e7ff] dark:hover:bg-slate-800{% endif %}"
                href="/camp">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' {% if path == '/camp' %}1{% else %}0{% endif %};">groups</span>
                <span class="text-sm">주요 성과 지표</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 {% if path == '/team' %}text-[#004ac6] dark:text-[#2563eb] font-bold bg-[#ffffff] dark:bg-slate-800 shadow-sm{% else %}text-[#434655] dark:text-slate-400 hover:text-[#004ac6] dark:hover:text-white hover:bg-[#e2e7ff] dark:hover:bg-slate-800{% endif %}"
                href="/team">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' {% if path == '/team' %}1{% else %}0{% endif %};">hub</span>
                <span class="text-sm">프로젝트 현황</span>
            </a>
            <a class="flex items-center gap-3 text-[#434655] dark:text-slate-400 px-4 py-3 hover:text-[#004ac6] dark:hover:text-white hover:bg-[#e2e7ff] dark:hover:bg-slate-800 transition-all duration-300"
                href="#">
                <span class="material-symbols-outlined">settings</span>
                <span class="text-sm">설정</span>
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-outline-variant/10">
             <!-- User Profile Mockup -->
             <div class="flex items-center gap-3 px-2">
                <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white font-bold">JW</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-sm font-bold truncate">CEO JW Yoon</p>
                    <p class="text-[10px] text-on-surface-variant truncate font-medium">Lumina Tech Admin</p>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant text-sm cursor-pointer hover:text-primary">more_vert</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="ml-64 min-h-screen">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
